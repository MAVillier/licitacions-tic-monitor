name: fetch

on:
  schedule:
    - cron: '15 6 * * *'      # Diari 06:15 UTC (~07:15 CET)
  workflow_dispatch: {}        # Botó si a pare ix
  push:
    paths:
      - '.github/workflows/fetch.yml'  # Qualsevol canvi aquí relança el workflow

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (no detached)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Build snapshot from EXPORT with Python
        shell: bash
        run: |
          set -e
          mkdir -p data
          python - << 'PY'
          import json, urllib.request, datetime, sys
          FROM = (datetime.datetime.utcnow() - datetime.timedelta(days=365)).strftime('%Y-%m-%dT00:00:00Z')
          URL  = 'https://analisi.transparenciacatalunya.cat/api/views/ybgg-dgi6/rows.json?accessType=DOWNLOAD&$limit=20000'
          payload=None
          try:
              with urllib.request.urlopen(URL, timeout=180) as r:
                  payload = json.load(r)
          except Exception as e:
              payload = None
          items=[]
          if payload:
              cols = [c.get('fieldName') for c in payload['meta']['view']['columns']]
              for row in payload['data']:
                  obj = { cols[i]: row[i] for i in range(len(cols)) }
                  item = {
                      "codi_expedient": obj.get("codi_expedient"),
                      "objecte_contracte": obj.get("objecte_contracte") or obj.get("denominacio"),
                      "nom_organ": obj.get("nom_organ"),
                      "tipus_contracte": obj.get("tipus_contracte"),
                      "fase_publicacio": obj.get("fase_publicacio") or obj.get("resultat"),
                      "valor_estimat_contracte": obj.get("valor_estimat_contracte"),
                      "import_adjudicacio_sense": obj.get("import_adjudicacio_sense"),
                      "data_publicacio_anunci": obj.get("data_publicacio_anunci") or obj.get("data_publicacio"),
                      "termini_presentacio_ofertes": obj.get("termini_presentacio_ofertes"),
                      "enllac_publicacio": obj.get("enllac_publicacio"),
                      "denominacio_adjudicatari": obj.get("denominacio_adjudicatari"),
                      "codi_organ": obj.get("codi_organ")
                  }
                  dp = item["data_publicacio_anunci"]
                  if dp and dp >= FROM:
                      items.append(item)
          out = {
              "generatedAt": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              "items": items
          }
          with open('data/today.json','w',encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False)
          print('items:', len(items))
          PY

      - name: Commit snapshot
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          if [ -n "$(git status --porcelain data/today.json)" ]; then
            git add data/today.json
            git commit -m "chore(data): update snapshot (python)"
            git push
          else
            echo "No changes to commit"
          fi
