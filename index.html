<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Licitacions TIC – filtre CPV a origen</title>
  styles.css
</head>
<body>
  <header class="app-header">
    <h1>Licitacions TIC</h1>
    <p class="subtitle">Vista zero-config: dades de la PSCP (Catalunya) amb filtre TIC a l'API</p>
  </header>

  <section class="controls">
    <label class="control">
      <span>Ordena per:</span>
      <select id="sortBy">
        <option value="date_desc" selected>Data publicació (recents → antics)</option>
        <option value="date_asc">Data publicació (antics → recents)</option>
        <option value="amount_desc">Import (alt → baix)</option>
        <option value="amount_asc">Import (baix → alt)</option>
      </select>
    </label>
    <button id="btnSync" class="primary">Actualitza</button>
  </section>

  <main>
    <div id="results" class="cards"></div>
  </main>

  <footer class="app-footer">
    <small>© 2026 · Zero-config sobre <code>analisi.transparenciacatalunya.cat</code> · Dataset <code>ybgg-dgi6</code></small>
  </footer>

  app.js</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sel = document.getElementById('sortBy');
      if (sel) sel.addEventListener('change', () => App.forceSync());
      document.getElementById('btnSync')?.addEventListener('click', () => App.forceSync());
      App.forceSync();
    });
  </script>
</body>
</html>
